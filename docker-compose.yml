version: '3.8'
services:
  gateway4:
    image: public.ecr.aws/c4d3l3m6/gateway4:latest
    container_name: gateway4
    restart: unless-stopped
    ports:
      - "8090:8090"
    networks:
      - app-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/gateway4
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgres:5432/gateway4
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/gateway4
      - SERVER_SERVLET_SESSION_COOKIE_SECURE=false
      - JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET=YzNmZGM5NzQyMzU4MGQ4NDM4NjgwOTc0ZWU3OTlmMjE5YjYwZGIwN2UyZTU1NjgwYThhZmI2N2UzZTAxZGU2Yzc2Y2VlODQ5N2IyNzhjNDY4ZGI2ZmMzNjI1YTA5OTk4ODg1ZTVlODdkNDU4NTI1MzM4MmZjYmE4ZTE3MGE2ZmQ=
      - SPRING_DATASOURCE_USERNAME=gateway4_user
      - SPRING_DATASOURCE_PASSWORD=gateway4_pass
      - SPRING_LIQUIBASE_USERNAME=gateway4_user
      - SPRING_LIQUIBASE_PASSWORD=gateway4_pass
      - SPRING_R2DBC_USERNAME=gateway4_user
      - SPRING_R2DBC_PASSWORD=gateway4_pass
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CONFIG_IMPORT=
      - EUREKA_CLIENT_ENABLED=false
  service3:
    image: public.ecr.aws/c4d3l3m6/service3:latest
    container_name: service3
    restart: unless-stopped
    ports:
      - "8091:8091"
    networks:
      - app-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/service3
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgres:5432/service3
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/service3
      - SERVER_SERVLET_SESSION_COOKIE_SECURE=false
      - JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET=YzNmZGM5NzQyMzU4MGQ4NDM4NjgwOTc0ZWU3OTlmMjE5YjYwZGIwN2UyZTU1NjgwYThhZmI2N2UzZTAxZGU2Yzc2Y2VlODQ5N2IyNzhjNDY4ZGI2ZmMzNjI1YTA5OTk4ODg1ZTVlODdkNDU4NTI1MzM4MmZjYmE4ZTE3MGE2ZmQ=
      - SPRING_DATASOURCE_USERNAME=service3_user
      - SPRING_DATASOURCE_PASSWORD=service3_pass
      - SPRING_LIQUIBASE_USERNAME=service3_user
      - SPRING_LIQUIBASE_PASSWORD=service3_pass
      - SPRING_R2DBC_USERNAME=service3_user
      - SPRING_R2DBC_PASSWORD=service3_pass
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - SPRING_CLOUD_CONFIG_FAIL_FAST=false
      - SPRING_CONFIG_IMPORT=
      - EUREKA_CLIENT_ENABLED=false

networks:
  app-network:
    external: true
